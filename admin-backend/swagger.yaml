openapi: 3.0.0
info:
  title: Admin Management Panel API
  description: API documentation for the Admin Management Panel backend.
  version: 1.0.0
servers:
  - url: http://localhost:4000/api
paths:
  /auth/login:
    post:
      summary: Admin login
      responses:
        '200':
          description: Login successful
  /categories:
    get:
      summary: Get all categories
      parameters:
        - name: public
          in: query
          schema:
            type: boolean
    post:
      summary: Create category
      security:
        - bearerAuth: []
  /products:
    get:
      summary: Get all products
      parameters:
        - name: public
          in: query
          schema:
            type: boolean
  /inquiries:
    post:
      summary: Submit inquiry
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
